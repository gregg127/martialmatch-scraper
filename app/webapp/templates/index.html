<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harmonogram MartialMatch</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Harmonogram MartialMatch</h1>
      <p class="app-description">
        Aplikacja wyświetla planowany harmonogram walk zawodników z wybranego
        klubu podczas wybranych zawodów.
      </p>

      <form id="tournamentForm">
        <div class="form-container">
          <div class="form-section tournament-type">
            <div class="radio-group">
              <label class="radio-label">
                <input
                  type="radio"
                  name="tournamentType"
                  value="current"
                  checked
                />
                <span>Nadchodzące zawody</span>
              </label>
              <label class="radio-label">
                <input type="radio" name="tournamentType" value="archived" />
                <span>Zawody archiwalne</span>
              </label>
            </div>
          </div>
          <div class="form-section select-section">
            <label class="select-label">Wybierz zawody:</label>
            <div class="combobox-wrapper">
              <button
                type="button"
                class="combobox-trigger"
                id="tournamentTrigger"
              >
                <span class="combobox-trigger-text" id="tournamentDisplay"
                  >Pobieram...</span
                >
                <span class="combobox-arrow" aria-hidden="true">▾</span>
              </button>
              <ul
                id="tournamentDropdown"
                class="combobox-dropdown"
                role="listbox"
                hidden
              ></ul>
            </div>
          </div>
          <div class="form-section select-section">
            <label for="clubInput" class="select-label">Wybierz klub:</label>
            <div class="combobox-wrapper">
              <input
                type="text"
                id="clubInput"
                autocomplete="off"
                placeholder="Wpisz lub wybierz klub..."
              />
              <ul
                id="clubDropdown"
                class="combobox-dropdown"
                role="listbox"
                hidden
              ></ul>
              <input type="hidden" id="clubAcademy" />
              <input type="hidden" id="clubBranch" />
            </div>
          </div>
          <div class="form-section button-section">
            <button type="submit">Pokaż Harmonogram</button>
          </div>
        </div>
      </form>

      <div id="loading" style="display: none">Pobieram...</div>

      <div id="results" style="display: none">
        <div id="scheduleContainer" class="schedule-container"></div>
      </div>

      <div id="error" style="display: none" class="error"></div>
    </div>
    <footer class="footer">
      <div class="footer-content">
        <p>© 2026 Grzegorz Gołębiowski</p>
        <p>
          <a
            href="https://github.com/gregg127"
            target="_blank"
            rel="noopener noreferrer"
            class="github-link"
          >
            <img
              src="/static/svg/github-mark.svg"
              alt="GitHub"
              class="github-icon"
            />
            GitHub
          </a>
        </p>
        <p>
          Dane publiczne pobrane z
          <a
            href="https://martialmatch.com"
            target="_blank"
            rel="noopener noreferrer"
            >MartialMatch</a
          >
        </p>
      </div>
    </footer>
    <script src="/static/js/main.js"></script>
  </body>
</html>
